services:
  # ── Databases ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: trading_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trading_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading"]
      interval: 10s
      timeout: 5s
      retries: 5

  questdb:
    image: questdb/questdb:latest
    container_name: trading_questdb
    restart: unless-stopped
    environment:
      QDB_CAIRO_MAX_UNCOMMITTED_ROWS: "1000"
    volumes:
      - questdb_data:/var/lib/questdb
    ports:
      - "9000:9000"   # HTTP REST + Web UI  → http://localhost:9000
      - "19009:9009"  # InfluxDB line protocol (bulk insert) — host 19009 avoids Windows WSL2 reservation
      - "8812:8812"   # PostgreSQL wire protocol (asyncpg queries)
  # ── Application ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trading_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      questdb:
        condition: service_started
    # .env values can be overridden by the explicit environment block below
    env_file:
      - path: ./backend/.env
        required: false   # won't fail if .env doesn't exist yet
    environment:
      # Override DB connection to use Docker service names instead of localhost
      DATABASE_URL: postgresql+asyncpg://trading:${POSTGRES_PASSWORD:-trading_dev}@postgres:5432/trading
      QUESTDB_HOST: questdb
      QUESTDB_PG_PORT: "8812"
    volumes:
      # Hot-reload: mount source so uvicorn --reload picks up changes
      - ./backend:/app
      # Preserve the .venv installed during image build (don't let host override it)
      - backend_venv:/app/.venv
    command: uv run uvicorn main:app --reload --reload-delay 0.25 --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trading_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
      # Required on Windows + Docker Desktop: uses polling instead of inotify
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      # Hot-reload: mount source so Next.js dev server picks up changes
      - ./frontend:/app
      # Preserve node_modules installed during image build
      - /app/node_modules
      # Preserve Next.js build cache between restarts
      - /app/.next
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  questdb_data:
  backend_venv:    # named: persists Python packages across backend container rebuilds
