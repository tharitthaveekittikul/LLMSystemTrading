services:
  # ── Databases ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: trading_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trading_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading"]
      interval: 10s
      timeout: 5s
      retries: 5

  questdb:
    image: questdb/questdb:latest
    container_name: trading_questdb
    restart: unless-stopped
    environment:
      QDB_CAIRO_MAX_UNCOMMITTED_ROWS: "1000"
    volumes:
      - questdb_data:/var/lib/questdb
    ports:
      - "9000:9000"   # HTTP REST + Web UI  → http://localhost:9000
      - "19009:9009"  # InfluxDB line protocol (bulk insert) — host 19009 avoids Windows WSL2 reservation
      - "8812:8812"   # PostgreSQL wire protocol (asyncpg queries)

volumes:
  postgres_data:
  questdb_data:
