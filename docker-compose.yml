services:
  postgres:
    image: postgres:16-alpine
    container_name: trading_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trading_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading"]
      interval: 10s
      timeout: 5s
      retries: 5

  questdb:
    image: questdb/questdb:latest
    container_name: trading_questdb
    restart: unless-stopped
    environment:
      QDB_CAIRO_MAX_UNCOMMITTED_ROWS: "1000"
      QDB_LINE_TCP_AUTH_DB_PATH: ""
    volumes:
      - questdb_data:/var/lib/questdb
    ports:
      - "9000:9000"   # HTTP REST + Web UI  → http://localhost:9000
      - "9009:9009"   # InfluxDB line protocol (bulk insert)
      - "8812:8812"   # PostgreSQL wire protocol (asyncpg queries)
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Optional: run backend + frontend via Docker ──────────────────────────
  # Use profile "full" to include these services:
  #   docker compose --profile full up --build

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trading_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      questdb:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://trading:${POSTGRES_PASSWORD:-trading_dev}@postgres:5432/trading
      QUESTDB_HOST: questdb
      QUESTDB_PG_PORT: "8812"
    volumes:
      - ./backend:/app       # hot-reload in development
    ports:
      - "8000:8000"
    profiles:
      - full

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trading_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    profiles:
      - full

volumes:
  postgres_data:
  questdb_data:
